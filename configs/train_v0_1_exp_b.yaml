experiment_name: peptidquantum_v0_1_final_classical_features

data:
  canonical_dir: data/canonical
  splits_dir: data/canonical/splits
  chain_id_mode: auth
  residue_number_mode: auth
  peptide_len_min: 5
  peptide_len_max: 50
  protein_len_min: 30
  max_pairs_per_structure: 50
  use_core_and_extension: false
  quality_filter: clean

features:
  residue_embedding_dim: 32
  use_residue_type_onehot: true
  use_position_index: true
  use_chain_flags: true
  use_interface_flag: true
  use_pocket_flag: true
  use_local_density: true
  use_secondary_structure: true
  local_density_radius: 8.0
  use_distance_edge_features: true
  edge_dim: 8
  normalize_distances: true
  distance_threshold: 8.0
  pocket_distance_threshold: 8.0
  interface_distance_threshold: 5.0

model:
  protein_encoder:
    type: GAT
    num_layers: 3
    hidden_dim: 128
    heads: 4
    dropout: 0.1
  peptide_encoder:
    type: GAT
    num_layers: 3
    hidden_dim: 128
    heads: 4
    dropout: 0.1
  fusion:
    type: co_attention
    hidden_dim: 128
    num_heads: 4
    dropout: 0.1
  scorer:
    type: bilinear
    hidden_dim: 128
  classifier_hidden_dim: 128
  quantum_head:
    enabled: false

training:
  task: interaction_scoring_reranking
  batch_size: 64
  grad_accum_steps: 1
  epochs: 20
  early_stopping_patience: 8
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_patience: 2
  scheduler_factor: 0.5
  max_grad_norm: 1.0
  mixed_precision: true
  seed: 42
  balanced_sampling:
    enabled: true
  negative_curriculum:
    enabled: true
    seed: 42
    stages:
      - name: easy_only
        end_epoch: 5
        ratios:
          easy: 1.0
          hard: 0.0
          structure_hard: 0.0
      - name: easy_hard_mix
        end_epoch: 15
        ratios:
          easy: 0.7
          hard: 0.3
          structure_hard: 0.0
      - name: full_curriculum
        end_epoch:
        ratios:
          easy: 0.6
          hard: 0.3
          structure_hard: 0.1

loss:
  type: ranking_plus_bce
  auto_pos_weight: true
  label_smoothing: 0.0
  bce_alpha: 0.3
  ranking:
    enabled: true
    margin: 0.2

evaluation:
  monitor_metric: val_mrr
  threshold_selection_metric: mcc
  decision_checkpoint_auroc_tolerance: 0.01
  save_best_only: true

logging:
  log_every_n_steps: 20
  save_dir: outputs/training/peptidquantum_v0_1_final_classical_features
  tensorboard: true
  save_predictions: true
